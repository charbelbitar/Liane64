services:

  backend:
    build: ./app
    container_name: rag-backend
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EMBEDDING_URL=http://embeddings:80
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION=MPJ_MPEDIA_PAPOTO_CAF_BGE
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data:ro 
      - ./feedback:/app/feedback
    depends_on:
      embeddings:
        condition: service_healthy
      chroma:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    image: nginx:alpine
    container_name: rag-frontend
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: embeddings
    command: --model-id BAAI/bge-m3
    volumes:
      - embeddings_cache:/data
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  chroma:
    image: chromadb/chroma
    container_name: chroma
    ports:
      - "127.0.0.1:8001:8000"
    restart: unless-stopped
    volumes:
      - ./data/chroma:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus

volumes:
  embeddings_cache:
  prometheus_data:
  grafana_data: