version: "3.9"

services:

  backend:
    build: ./app
    container_name: rag-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - EMBEDDING_URL=http://embeddings:80
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION=MPJ_MPEDIA_PAPOTO_CAF_BGE
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data:ro   # raw JSONL source files, read by ingest.py only
    depends_on:
      embeddings:
        condition: service_healthy
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    image: nginx:alpine
    container_name: rag-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: embeddings
    command: --model-id BAAI/bge-m3
    volumes:
      - embeddings_cache:/data
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  chroma:
    image: chromadb/chroma
    container_name: chroma
    ports:
      - "8001:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat', timeout=3)"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  embeddings_cache: